<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>WA State Fatal Vehicle Crash Causes 2015-2025</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+3">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <div class = "checkboxes">
        <label class="container distracted">Distracted
            <input type="checkbox" value="lineDistracted" checked="checked">
            <span class="checkmark"></span>
        </label>
        <label class="container speeding">Speeding
            <input type="checkbox" value="lineSpeeding" checked="checked">
            <span class="checkmark"></span>
        </label>  
        <label class="container alcohol">Alcohol
            <input type="checkbox" value="lineAlcohol" checked="checked">
            <span class="checkmark"></span>
        </label>  
        <label class="container drugs">Drugs
            <input type="checkbox" value="lineDrugs" checked="checked">
            <span class="checkmark"></span>
        </label>  
        <label class="container drowsy">Drowsy
            <input type="checkbox" value="lineDrowsy" checked="checked">
            <span class="checkmark"></span>
        </label>  
        </div>

        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script src="./main.js"></script>     
    </body>
</html>
